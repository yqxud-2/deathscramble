<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>deathscramble</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script>
        const warning = "WARNING: This game contains rapid flashing, high-contrast strobing, and disorienting visual patterns. It may cause motion sickness or trigger photosensitive seizures.\n\nType 'start' to acknowledge and proceed.";
        let userConfirm = prompt(warning);
        if (!userConfirm || userConfirm.toLowerCase() !== 'start') {
            window.location.href = "about:blank";
            throw new Error("User aborted execution."); // Stops the rest of the JS from running
        }
    </script>

    <svg style="width:0; height:0; position:absolute;">
        <filter id="liquid-warp">
            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="1" result="warp" />
            <feDisplacementMap xChannelSelector="R" yChannelSelector="G" scale="20" in="SourceGraphic" in2="warp" />
        </filter>
    </svg>


    <div id="game-viewport" class="pattern-a">
        
        <div id="normalBg" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;background-color:white;">
        </div>
        
        <div id="scrambled-container"></div>

        <div id="ui-layer">
            <input type="text" id="user-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="TYPE HERE">
        </div>

        <div id="admin-menu">
            <h2>settings for the weak minded or strong willed</h2>
    
            <div class="setting-row">
                <label for="speed-slider">slider of doom and despair... [<span id="multiplier-display">1.0x</span>]</label>
                <input type="range" id="speed-slider" min="0.2" max="5.0" step="0.1" value="1.0">
            </div>

            <div class="setting-row">
                <label for="toggle-teleport">word teleportation</label>
                <input type="checkbox" id="toggle-teleport" checked>
            </div>

            <div class="setting-row">
                <label for="toggle-jumping">jumping letters</label>
                <input type="checkbox" id="toggle-jumping" checked>
            </div>

            <div class="setting-row">
                <label for="toggle-angles">randomly angled letters</label>
                <input type="checkbox" id="toggle-angles" checked>
            </div>

            <div class="setting-row">
                <label for="toggle-sizing">randomly sized letters</label>
                <input type="checkbox" id="toggle-sizing" checked>
            </div>

            <div class="setting-row">
                <label for="toggle-fonts">cursed fonts</label>
                <input type="checkbox" id="toggle-fonts" checked>
            </div>

            <div class="setting-row">
                <label for="toggle-bg">seizure background</label>
                <input type="checkbox" id="toggle-bg" checked>
            </div>

            <button id="close-admin">exit</button>
        </div>
    </div>

    <div id="flash-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
